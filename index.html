<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>첫 발걸음 — 7일 런닝 프로그램</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== 화면 1: 홈 (운동장 뷰) ===== -->
  <div id="screen-home" class="screen active">
    <header class="home-header">
      <p class="app-label">첫 발걸음</p>
      <h1 class="home-title">7일 완주</h1>
      <p class="home-sub">매일 한 바퀴, 천천히 시작해요</p>
    </header>

    <!-- 운동장형 진행 트랙 -->
    <div class="track-container">
      <svg id="track-svg" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <!-- 트랙 배경 원 -->
        <ellipse cx="160" cy="160" rx="130" ry="110" fill="none" stroke="#e8e0d4" stroke-width="28"/>
        <!-- 완료된 진행 원호 (JS가 업데이트함) -->
        <ellipse id="track-progress" cx="160" cy="160" rx="130" ry="110"
          fill="none" stroke="#c8a96e" stroke-width="28"
          stroke-dasharray="0 9999"
          stroke-linecap="round"
          transform="rotate(-90 160 160)"/>
        <!-- 중앙 텍스트 -->
        <text id="track-day-num" x="160" y="148" text-anchor="middle"
          font-size="52" font-weight="700" fill="#2a2a2a" font-family="'Noto Serif KR', serif">1</text>
        <text x="160" y="178" text-anchor="middle"
          font-size="14" fill="#888" font-family="'Noto Sans KR', sans-serif">일차</text>
        <!-- 7개 날짜 점 (JS가 생성함) -->
        <g id="track-dots"></g>
      </svg>
    </div>

    <!-- 오늘 카드 -->
    <div id="today-card" class="today-card">
      <div class="today-label">오늘의 운동</div>
      <div id="today-title" class="today-title">준비 중...</div>
      <div id="today-meta" class="today-meta"></div>
      <button id="btn-start" class="btn-primary" onclick="startWorkout()">시작하기 →</button>
    </div>

    <!-- 완료 상태일 때 -->
    <div id="done-card" class="done-card hidden">
      <div class="done-icon">✓</div>
      <div class="done-text">오늘 완료!</div>
      <div id="done-next" class="done-next"></div>
    </div>
  </div>


  <!-- ===== 화면 2: 타이머 (운동 진행) ===== -->
  <div id="screen-timer" class="screen">
    <button class="btn-back" onclick="goBack()">← 나가기</button>

    <div class="timer-phase-label" id="phase-label">준비</div>
    <div class="timer-display">
      <span id="timer-min">00</span><span class="timer-colon">:</span><span id="timer-sec">00</span>
    </div>
    <div class="timer-phase-desc" id="phase-desc"></div>

    <!-- 전체 구간 미니맵 -->
    <div class="phase-map" id="phase-map"></div>

    <!-- 진행 바 -->
    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div id="progress-fill" class="progress-bar-fill"></div>
      </div>
      <div class="progress-labels">
        <span>시작</span>
        <span id="total-time-label"></span>
      </div>
    </div>

    <button id="btn-finish" class="btn-primary hidden" onclick="finishWorkout()">완료 →</button>
  </div>


  <!-- ===== 화면 3: 회복일 ===== -->
  <div id="screen-rest" class="screen">
    <div class="rest-content">
      <div class="rest-icon">🌿</div>
      <h2 class="rest-title">오늘은 쉬어도 돼요</h2>
      <p class="rest-desc">
        몸이 성장하는 건 운동할 때가 아니라<br/>
        쉬는 동안이에요.<br/><br/>
        원한다면 가볍게 15~20분 산책해요.<br/>
        뛰지 않아도 충분히 잘하고 있어요.
      </p>
      <div class="rest-tip">💡 내일이 진짜 도약의 날이에요</div>
      <button class="btn-primary" onclick="markRestDone()">오늘 완료로 표시하기</button>
    </div>
  </div>


  <!-- ===== 화면 4: 7일 완주 ===== -->
  <div id="screen-complete" class="screen">
    <div class="complete-content">
      <div class="complete-badge">🏅</div>
      <h2 class="complete-title">7일 완주!</h2>
      <p class="complete-desc">
        처음 시작한 것 자체가 대단해요.<br/>
        습관의 씨앗이 심어졌어요.
      </p>
      <button class="btn-secondary" onclick="resetApp()">다시 시작하기</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
